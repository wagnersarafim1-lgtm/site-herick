<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erik Estevão | Luxury Image Strategy</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --bg-site: #f2ede4;
            --text-main: #2d2621;
            --accent-gold: #b59461;
            --footer-bg: #111111;
            --whatsapp-color: #25d366;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        body { background-color: var(--bg-site); font-family: 'Montserrat', sans-serif; color: var(--text-main); line-height: 1.8; overflow-x: hidden; }

        /* Navegação Fixa e Elegante */
        nav {
            position: fixed; top: 0; width: 100%; background: rgba(255, 255, 255, 0.98);
            padding: 20px 8%; z-index: 100; display: flex; justify-content: space-between; 
            align-items: center; border-bottom: 1px solid rgba(181, 148, 97, 0.1);
        }
        .logo { font-family: 'Playfair Display'; font-weight: 700; font-size: 24px; color: var(--text-main); text-decoration: none; letter-spacing: 2px; }
        nav .links a { text-decoration: none; color: var(--text-main); font-size: 11px; text-transform: uppercase; letter-spacing: 2px; font-weight: 700; margin-left: 30px; transition: 0.3s; }
        nav .links a:hover { color: var(--accent-gold); }

        /* --- BOTÕES FLUTUANTES INTERATIVOS (NOVO) --- */
        .float-contact-wrapper {
            position: fixed; bottom: 30px; right: 30px;
            display: flex; flex-direction: column; gap: 15px; z-index: 1000;
        }

        .btn-float {
            width: 60px; height: 60px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 28px; color: #fff; text-decoration: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            transition: 0.3s; 
        }
        .btn-float:hover { transform: scale(1.1) translateY(-5px); }

        .btn-whatsapp { background-color: var(--whatsapp-color); animation: pulseFloat 2s infinite; }
        .btn-email { background-color: var(--accent-gold); }

        @keyframes pulseFloat {
            0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(37, 211, 102, 0); }
            100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); }
        }

        /* Hero (Topo) Proporcional */
