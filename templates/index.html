<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erik Estevão | Luxury Image Strategy</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --bg-site: #f2ede4;
            --text-main: #2d2621;
            --accent-gold: #b59461;
            --footer-bg: #111111;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        body { background-color: var(--bg-site); font-family: 'Montserrat', sans-serif; color: var(--text-main); line-height: 1.8; }

        nav {
            position: fixed; top: 0; width: 100%; background: #fff;
            padding: 20px 8%; z-index: 100; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .logo { font-family: 'Playfair Display'; font-weight: 700; font-size: 22px; color: #111; text-decoration: none; letter-spacing: 2px; }

        .hero {
            height: 100vh;
            /* Se a imagem falhar, o fundo fica cinza escuro em vez de preto total */
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url("{{ url_for('static', filename='imagens/foto_herick3.png.jpeg') }}") center/cover no-repeat;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; color: #fff; padding: 0 10%;
        }
        .hero h1 { font-family: 'Playfair Display'; font-size: clamp(40px, 8vw, 80px); text-transform: uppercase; }
        .hero p { color: var(--accent-gold); letter-spacing: 6px; text-transform: uppercase; font-weight: 700; font-size: 13px; }

        #sobre { 
            padding: 120px 8%; background: #fff; min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }
        .about-wrap { display: flex; align-items: center; gap: 60px; max-width: 1200px; width: 100%; }
        .about-img img { width: 100%; max-width: 450px; border-radius: 4px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .about-text h2 { font-family: 'Playfair Display'; font-size: 45px; margin-bottom: 20px; }

        footer { background: var(--footer-bg); color: #fff; padding: 80px 8% 40px; }
        .footer-grid { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 40px; }
        .footer-social a { color: var(--accent-gold); font-size: 24px; margin-right: 20px; text-decoration: none; }
        
        @media (max-width: 900px) {
            .about-wrap { flex-direction: column; text-align: center; }
            .hero h1 { font-size: 45px; }
        }
    </style>
</head>
<body>

    <nav><a href="#" class="logo">ERIK ESTEVÃO</a></nav>

    <header class="hero">
        <p>Image Strategist</p>
        <h1>Erik Estevão</h1>
    </header>

    <section id="sobre">
        <div class="about-wrap">
            <div class="about-img">
                <img src="{{ url_for('static', filename='imagens/foto_herick.png.jpeg') }}" alt="Erik Estevão">
            </div>
            <div class="about-text">
                <h2>A Mente por Trás da Estratégia</h2>
                <p>Erik Estevão transforma imagem em autoridade para o mercado de alto luxo.</p>
            </div>
        </div>
    </section>

    <footer>
        <div class="footer-grid">
            <div>
                <h4 style="color: var(--accent-gold); margin-bottom: 15px;">CONTATO</h4>
                <p>Goiânia - GO | +55 (61) 98168-2382</p>
                <p>Erikstylist@gmail.com</p>
            </div>
            <div class="footer-social">
                <a href="#"><i class="fab fa-instagram"></i></a>
                <a href="#"><i class="fab fa-whatsapp"></i></a>
            </div>
        </div>
        <p style="text-align: center; margin-top: 40px; opacity: 0.3; font-size: 10px;">&copy; 2026 DESENVOLVIDO POR WAGNER SARAFIM</p>
    </footer>

</body>
</html>
