        :root {

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        body { background-color: var(--bg-site); font-family: 'Montserrat', sans-serif; color: var(--text-main); line-height: 1.8; overflow-x: hidden; }

        /* Navegação */
        nav {

        }
        .logo { font-family: 'Playfair Display'; font-weight: 700; font-size: 24px; color: var(--text-main); text-decoration: none; letter-spacing: 2px; }
        nav .links a { text-decoration: none; color: var(--text-main); font-size: 10px; text-transform: uppercase; letter-spacing: 2px; font-weight: 700; margin-left: 30px; }

        /* Botão Flutuante */
        .btn-flutuante {
            position: fixed; bottom: 40px; right: 40px;
            width: 60px; height: 60px; background-color: #25d366;
            color: #fff; border-radius: 50%; display: flex;
            align-items: center; justify-content: center;
            font-size: 30px; box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            z-index: 1000; text-decoration: none;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(37, 211, 102, 0); }
            100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); }
        }

            height: 55vh;

            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url("{{ url_for('static', filename='imagens/foto_herick.png') }}");

            background-position: center;
            background-color: #2d2621;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: #fff;
        }

        .hero p { letter-spacing: 8px; text-transform: uppercase; color: var(--accent-gold); font-weight: 700; font-size: 12px; }
