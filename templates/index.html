            --bg-site: #f2ede4;

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        body { background-color: var(--bg-site); font-family: 'Montserrat', sans-serif; color: var(--text-main); line-height: 1.8; overflow-x: hidden; }

        /* Navegação */
        nav {
            position: fixed; top: 0; width: 100%; background: rgba(255, 255, 255, 0.98);

            align-items: center; border-bottom: 1px solid rgba(181, 148, 97, 0.1);

        nav .links a { text-decoration: none; color: var(--text-main); font-size: 10px; text-transform: uppercase; letter-spacing: 2px; font-weight: 700; margin-left: 30px; transition: 0.3s; }

        /* Botão Flutuante */
        .btn-flutuante {
            position: fixed; bottom: 40px; right: 40px;
            width: 60px; height: 60px; background-color: #25d366;
            color: #fff; border-radius: 50%; display: flex;
            align-items: center; justify-content: center;
            font-size: 30px; box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            z-index: 1000; transition: 0.3s; text-decoration: none;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(37, 211, 102, 0); }
            100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); }
        }

        .hero {

            background: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)), url('static/imagens/foto_herick.png');
            background-size: contain; /* Garante que a imagem não seja cortada */
            background-repeat: no-repeat;
            background-position: center;
            background-color: #2d2621; /* Fundo sólido para preencher as laterais se necessário */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: #fff;
            padding-top: 60px;
