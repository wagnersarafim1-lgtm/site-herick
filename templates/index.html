<!DOCTYPE html>
<html lang="pt-br">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erik Estevão | Luxury Image Strategy</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --bg-site: #f2ede4;
            --text-main: #2d2621;
            --accent-gold: #b59461;
            --footer-bg: #111111;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        body { background-color: var(--bg-site); font-family: 'Montserrat', sans-serif; color: var(--text-main); line-height: 1.8; overflow-x: hidden; }

        /* Navegação */
        nav {
            position: fixed; top: 0; width: 100%; background: rgba(255, 255, 255, 0.98);
            padding: 25px 8%; z-index: 100; display: flex; justify-content: space-between; 
            align-items: center; border-bottom: 1px solid rgba(181, 148, 97, 0.1);
        }
        .logo { font-family: 'Playfair Display'; font-weight: 700; font-size: 26px; color: var(--text-main); text-decoration: none; letter-spacing: 3px; }
        nav .links a { text-decoration: none; color: var(--text-main); font-size: 11px; text-transform: uppercase; letter-spacing: 2px; font-weight: 700; margin-left: 35px; transition: 0.3s; }

        /* Botão Flutuante */
        .btn-flutuante {
            position: fixed; bottom: 40px; right: 40px;
            width: 70px; height: 70px; background-color: #25d366;
            color: #fff; border-radius: 50%; display: flex;
            align-items: center; justify-content: center;
            font-size: 34px; box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            z-index: 1000; transition: 0.3s; text-decoration: none;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(37, 211, 102, 0); }
            100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); }
        }

        /* Seção Hero - DIMINUÍDA para não sobrepor */
        .hero {
            height: 70vh; /* Reduzi de 100vh para 70vh */
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('static/imagens/foto_herick3.png.jpeg');
            background-size: cover;
            background-position: center 20%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: #fff;
            padding-top: 80px;
        }
        .hero h1 { font-family: 'Playfair Display'; font-size: clamp(40px, 8vw, 75px); text-transform: uppercase; color: #fff; margin-bottom: 10px; }
        .hero p { letter-spacing: 10px; text-transform: uppercase; color: var(--accent-gold); font-weight: 700; font-size: 13px; }

        /* Seção Sobre */
        #sobre { 
            padding: 100px 8%; 
            background: #fff; 
            display: flex;
            align-items: center;
        }
        .about-wrap { display: flex; align-items: flex-start; justify-content: center; gap: 80px; max-width: 1400px; margin: 0 auto; }
        .about-img { flex: 1; text-align: right; }
        .about-img img { width: 100%; max-width: 480px; border-radius: 4px; box-shadow: 0 25px 50px rgba(0,0,0,0.15); }
        
        .about-text { flex: 1.2; }
        .tag { letter-spacing: 10px; color: var(--accent-gold); font-size: 12px; text-transform: uppercase; font-weight: 700; display: block; margin-bottom: 25px; }
        .about-text h2 { font-family: 'Playfair Display'; font-size: 52px; margin-bottom: 30px; line-height: 1.1; }
        .about-text p { font-size: 19px; margin-bottom: 25px; color: #444; text-align: justify; }

        .quote-box { 
            margin-top: 40px; padding: 35px; border-left: 5px solid var(--accent-gold); 
            background: var(--bg-site); font-family: 'Playfair Display'; font-style: italic; font-size: 22px; 
        }

        /* Depoimentos */
        #depoimentos { padding: 120px 8%; text-align: center; background: var(--bg-site); }
        .testimonial-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); gap: 40px; max-width: 1300px; margin: 60px auto 0; }
        .testimonial-card { background: #fff; padding: 50px; border-radius: 4px; text-align: left; box-shadow: 0 10px 30px rgba(0,0,0,0.03); }

        /* Rodapé */
        footer { background: var(--footer-bg); color: #fff; padding: 100px 8% 50px; }
        .footer-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 60px; }
