<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erik Estevão | Luxury Image Strategy</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --bg-site: #f2ede4;
            --text-main: #2d2621;
            --accent-gold: #b59461;
            --footer-bg: #111111;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        body { background-color: var(--bg-site); font-family: 'Montserrat', sans-serif; color: var(--text-main); line-height: 1.8; overflow-x: hidden; }

        /* Menu */
        nav {
            position: fixed; top: 0; width: 100%; background: #fff;
            padding: 25px 8%; z-index: 100; display: flex; justify-content: space-between; 
            align-items: center; border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .logo { font-family: 'Playfair Display'; font-weight: 700; font-size: 26px; color: var(--text-main); text-decoration: none; letter-spacing: 3px; }

        /* WhatsApp Flutuante com Brilho */
        .btn-whats-float {
            position: fixed; bottom: 40px; right: 40px;
            width: 75px; height: 75px; background-color: #25d366;
            color: #fff; border-radius: 50%; display: flex;
            align-items: center; justify-content: center;
            font-size: 36px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            z-index: 1000; animation: pulse 2s infinite; overflow: hidden; text-decoration: none;
        }
        .btn-whats-float::after {
            content: ""; position: absolute; top: -50%; left: -150%; width: 250%; height: 250%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.4), transparent);
            transform: rotate(45deg); animation: shine 3s infinite;
        }
        @keyframes shine { 0% { left: -150%; } 100% { left: 150%; } }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7); } 70% { box-shadow: 0 0 0 20px rgba(37, 211, 102, 0); } 100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); } }

        /* Seção Sobre - Foto e Texto Lado a Lado */
        #sobre { padding: 180px 8% 120px; background: #fff; min-height: 100vh; display: flex; align-items: center; }
        .about-wrap { display: flex; align-items: center; justify-content: center; gap: 80px; max-width: 1400px; margin: 0 auto; width: 100%; }
        
        .about-img { flex: 1; }
        .about-img img { width: 100%; border-radius: 4px; box-shadow: 0 35px 70px rgba(0,0,0,0.18); display: block; }
        
        .about-text { flex: 1.2; }
        .about-text h2 { font-family: 'Playfair Display'; font-size: 60px; margin-bottom: 30px; line-height: 1.1; }
        .quote-box { margin-top: 40px; padding: 40px; border-left: 6px solid var(--accent-gold); background: var(--bg-site); font-family: 'Playfair Display'; font-style: italic; font-size: 26px; }

        /* Feedbacks em 2 colunas largas */
        #depoimentos { padding: 120px 8%; background: var(--bg-site); }
        .testimonial-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 30px; 
            max-width: 1300px; 
            margin: 0 auto; 
        }
        .testimonial-card { background: #fff; padding: 50px; border-radius: 4px; box-shadow: 0 15px 30px rgba(0,0,0,0.05); }

        /* Rodapé com Botões na Horizontal */
        footer { background: var(--footer-bg); color: #fff; padding: 80px 8%; }
        .footer-social { display: flex; gap: 20px; margin-top: 30px; }
        .footer-social a { 
            color: var(--accent-gold); font-size: 28px; width: 60px; height: 60px; 
            border: 1px solid rgba(181, 148, 97, 0.3); display: flex; 
            align-items: center; justify-content: center; border-radius: 50%; text-decoration: none; 
        }

        @media (max-width: 1000px) {
            .about-wrap { flex-direction: column; text-align: center; }
            .testimonial-grid { grid-template-columns: 1fr; }
            .about-text h2 { font-size: 42px; }
        }
    </style>
</head>
<body>

    <a href="https://wa.me/5561981682382" class="btn-whats-float" target="_blank"><i class="fab fa-whatsapp"></i></a>

    <nav>
        <a href="#" class="logo">ERIK ESTEVÃO</a>
    </nav>

    <section id="sobre">
        <div class="about-wrap">
            <div class="about-img">
                <img src="/static/imagens/foto_herick.png.jpeg" alt="Erik Estevão">
            </div>
            <div class="about-text">
                <span style="letter-spacing: 10px; color: var(--accent-gold); font-weight: 700; text-transform: uppercase; font-size: 12px; display: block; margin-bottom: 20px;">Image Strategist</span>
                <h2>A Mente por Trás da Estratégia</h2>
                <p style="font-size: 20px;">Especialista em decodificar a linguagem silenciosa do sucesso, Erik Estevão transforma imagem em autoridade absoluta.</p>
