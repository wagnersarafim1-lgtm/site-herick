<style>
    /* ... seu código anterior ... */

    /* AJUSTE DE ALINHAMENTO DA SEÇÃO SOBRE */
    #sobre { 
        padding: 120px 8%; /* Reduzi um pouco o padding para não ficar um buraco branco gigante */
        background: #fff; 
        min-height: 100vh;
        display: flex;
        align-items: center; /* Centraliza verticalmente o conteúdo na tela */
        justify-content: center;
    }

    .about-wrap { 
        display: flex; 
        align-items: center; /* Centraliza a imagem e o texto um em relação ao outro */
        justify-content: space-between; 
        gap: 60px; 
        max-width: 1200px; 
        margin: 0 auto;
        width: 100%;
    }

    .about-img { 
        flex: 1; 
        display: flex;
        justify-content: center; /* Garante que a imagem esteja no centro do lado dela */
    }

    .about-img img { 
        width: 100%; 
        max-width: 450px; /* Tamanho fixo para não distorcer */
        height: auto;
        border-radius: 4px; 
        box-shadow: 0 30px 60px rgba(0,0,0,0.15); 
    }
    
    .about-text { 
        flex: 1.2; 
        text-align: left; /* Mantém o texto alinhado à esquerda como no print */
    }

    /* Ajuste para mobile */
    @media (max-width: 900px) { 
        .about-wrap { 
            flex-direction: column; 
            text-align: center; 
            gap: 40px;
        } 
        .about-text {
            text-align: center;
        }
    }
</style>
